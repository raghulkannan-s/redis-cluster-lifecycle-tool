---
- name: Install and configure Redis on all cluster nodes
  hosts: redis_cluster
  become: true
  gather_facts: true
  roles:
    - redis

- name: Form the Redis cluster
  hosts: redis-node-1
  become: true
  gather_facts: false
  vars:
    redis_cli: "/usr/local/bin/redis-cli"
    redis_port: 6379
  tasks:

    - name: Check cluster nodes
      command: "{{ redis_cli }} -p {{ redis_port }} cluster nodes"
      register: cluster_nodes_check
      failed_when: false
      changed_when: false

    - name: Build list of master node container IPs:port
      set_fact:
        master_endpoints: "{{ groups['masters'] | map('extract', hostvars, ['container_ip']) | map('regex_replace', '^(.*)$', '\\1:' ~ (redis_port | string)) | list }}"

    - name: Build list of replica node container IPs:port
      set_fact:
        replica_endpoints: "{{ groups['replicas'] | map('extract', hostvars, ['container_ip']) | map('regex_replace', '^(.*)$', '\\1:' ~ (redis_port | string)) | list }}"

    - name: Cluster Creation Block
      block:
        - name: Create the cluster (masters + replicas, replication factor 1)
          command: >
            {{ redis_cli }} --cluster create
            {{ (master_endpoints + replica_endpoints) | join(' ') }}
            --cluster-replicas 1
            --cluster-yes
          register: cluster_create
          when: cluster_nodes_check.stdout_lines | length < 2
      rescue:
        - name: Diagnostics - Fetch Redis logs
          command: cat /var/log/redis/redis-server.log
          register: redis_logs
          changed_when: false
          ignore_errors: true

        - name: Diagnostics - Print Redis logs
          debug:
            var: redis_logs.stdout_lines

        - name: Diagnostics - Check network interfaces
          command: ip addr
          register: ip_addr
          changed_when: false
          ignore_errors: true

        - name: Diagnostics - Print network interfaces
          debug:
            var: ip_addr.stdout_lines

        - name: Diagnostics - Check routing table
          command: ip route
          register: ip_route
          changed_when: false
          ignore_errors: true

        - name: Diagnostics - Print routing table
          debug:
            var: ip_route.stdout_lines

        - name: Diagnostics - Ping 10.10.0.11
          command: ping -c 3 10.10.0.11
          register: ping_test
          changed_when: false
          ignore_errors: true

        - name: Diagnostics - Print ping result
          debug:
            var: ping_test.stdout_lines

        - name: Fail playbook
          fail:
            msg: "Cluster creation failed. Dumped diagnostics above. Likely a WSL/VPN host routing conflict for 10.10.0.x."

    - name: Show cluster creation output
      debug:
        var: cluster_create.stdout_lines
      when: cluster_create is defined and cluster_create is changed

    - name: Wait for cluster to converge (cluster_state:ok)
      command: "{{ redis_cli }} -p {{ redis_port }} cluster info"
      register: cluster_converge
      until: "'cluster_state:ok' in cluster_converge.stdout"
      retries: 15
      delay: 2
      changed_when: false
      when: cluster_create is defined and cluster_create is changed

    - name: Confirm cluster state
      command: "{{ redis_cli }} -p {{ redis_port }} cluster info"
      register: final_cluster_info
      changed_when: false

    - name: Display final cluster info
      debug:
        var: final_cluster_info.stdout_lines

    - name: Display cluster topology (nodes)
      command: "{{ redis_cli }} -p {{ redis_port }} cluster nodes"
      register: cluster_nodes
      changed_when: false

    - name: Show cluster topology
      debug:
        var: cluster_nodes.stdout_lines
