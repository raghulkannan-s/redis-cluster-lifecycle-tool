---
- name: Install and configure Redis on all cluster nodes
  hosts: redis_cluster
  become: true
  gather_facts: true
  roles:
    - redis

- name: Form the Redis cluster
  hosts: redis-node-1
  become: true
  gather_facts: false
  vars:
    redis_cli: "/usr/local/bin/redis-cli"
    redis_port: 6379
  tasks:

    - name: Check whether cluster is already formed
      command: "{{ redis_cli }} -p {{ redis_port }} cluster info"
      register: cluster_info_check
      changed_when: false

    - name: Build list of master node IPs:port
      set_fact:
        master_endpoints: "{{ groups['masters'] | map('extract', hostvars, ['ansible_host']) | map('regex_replace', '^(.*)$', '\\1:' ~ redis_port) | list }}"

    - name: Build list of replica node IPs:port
      set_fact:
        replica_endpoints: "{{ groups['replicas'] | map('extract', hostvars, ['ansible_host']) | map('regex_replace', '^(.*)$', '\\1:' ~ redis_port) | list }}"

    - name: Create the cluster (masters + replicas, replication factor 1)
      command: >
        {{ redis_cli }} --cluster create
        {{ (master_endpoints + replica_endpoints) | join(' ') }}
        --cluster-replicas 1
        --cluster-yes
      register: cluster_create
      when: "'cluster_state:ok' not in cluster_info_check.stdout"

    - name: Show cluster creation output
      debug:
        var: cluster_create.stdout_lines
      when: cluster_create is defined and cluster_create is changed

    - name: Confirm cluster state
      command: "{{ redis_cli }} -p {{ redis_port }} cluster info"
      register: final_cluster_info
      changed_when: false

    - name: Display final cluster info
      debug:
        var: final_cluster_info.stdout_lines

    - name: Display cluster topology (nodes)
      command: "{{ redis_cli }} -p {{ redis_port }} cluster nodes"
      register: cluster_nodes
      changed_when: false

    - name: Show cluster topology
      debug:
        var: cluster_nodes.stdout_lines