---
- name: restart redis
  shell: |
    {{ redis_symlink_dir }}/redis-cli -p {{ redis_port }} shutdown || true
    sleep 2
    rm -f {{ redis_pid_file }}
    {{ redis_symlink_dir }}/redis-server {{ redis_config_file }}

    for i in $(seq 1 15); do
      if {{ redis_symlink_dir }}/redis-cli -p {{ redis_port }} ping 2>/dev/null | grep -q PONG; then
        exit 0
      fi
      sleep 2
    done

    exit 1