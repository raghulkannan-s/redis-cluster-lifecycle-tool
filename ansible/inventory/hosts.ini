[masters]
redis-node-1 ansible_host=10.10.0.11 redis_node_id=1
redis-node-2 ansible_host=10.10.0.12 redis_node_id=2
redis-node-3 ansible_host=10.10.0.13 redis_node_id=3

[replicas]
redis-node-4 ansible_host=10.10.0.14 redis_node_id=4 replicates_master=redis-node-1
redis-node-5 ansible_host=10.10.0.15 redis_node_id=5 replicates_master=redis-node-2
redis-node-6 ansible_host=10.10.0.16 redis_node_id=6 replicates_master=redis-node-3

[redis_cluster:children]
masters
replicas

[redis_cluster:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh-redis-tool/id_rsa
ansible_python_interpreter=/usr/bin/python3